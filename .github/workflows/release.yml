name: Build installable module zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deliverydate.zip
        run: |
          set -euo pipefail
          MODULE="deliverydate"
          rm -rf dist
          mkdir -p "dist/${MODULE}"
          rsync -a \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='.github' \
            ./ "dist/${MODULE}/"
          (cd dist && zip -r "${MODULE}.zip" "${MODULE}")

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/deliverydate.zip
